let lang='ar',mod='iala',selB=null,selL=null,selR=null,qIdx=0,qScore=0,qAns=false,qDone=false;

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach((b,i)=>b.classList.toggle('active',['ar','fr','en'][i]===l));
  document.getElementById('hdesc').textContent=L[l].desc;
  ['mn0','mn1','mn2','mn3'].forEach((id,i)=>document.getElementById(id).textContent=L[l].mn[i]);
  document.getElementById('app').dir=l==='ar'?'rtl':'ltr';
  render();
}

function setMod(m){
  mod=m;selB=null;selL=null;selR=null;qIdx=0;qScore=0;qAns=false;qDone=false;
  document.querySelectorAll('.mod-btn').forEach((b,i)=>b.classList.toggle('active',['iala','lights','colreg','quiz'][i]===m));
  render();
}

function bSVG(b){
  const c=b.col;
  if(b.id==='port') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="6" width="16" height="32" rx="8" fill="${c}"/><rect x="12" y="38" width="16" height="5" rx="2" fill="${c}"/><rect x="18" y="1" width="4" height="8" fill="#aaa"/></svg>`;
  if(b.id==='stbd') return `<svg width="40" height="56" viewBox="0 0 40 56"><polygon points="20,6 34,42 6,42" fill="${c}"/><rect x="18" y="1" width="4" height="8" fill="#aaa"/></svg>`;
  if(b.id==='north') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="14" width="16" height="28" rx="3" fill="#FFD166"/><rect x="12" y="14" width="16" height="10" fill="#0A1628"/><polygon points="14,2 20,14 26,2" fill="#0A1628"/><polygon points="14,13 20,1 26,13" fill="#0A1628"/></svg>`;
  if(b.id==='south') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="12" width="16" height="28" rx="3" fill="#FFD166"/><rect x="12" y="30" width="16" height="10" fill="#0A1628"/><polygon points="14,44 20,56 26,44" fill="#0A1628"/><polygon points="14,54 20,42 26,54" fill="#0A1628"/></svg>`;
  if(b.id==='east') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="12" width="16" height="28" rx="3" fill="#FFD166"/><rect x="12" y="22" width="16" height="8" fill="#0A1628"/><polygon points="14,1 20,12 26,1" fill="#0A1628"/><polygon points="14,54 20,43 26,54" fill="#0A1628"/></svg>`;
  if(b.id==='west') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="12" width="16" height="28" rx="3" fill="#0A1628"/><rect x="12" y="12" width="16" height="9" fill="#FFD166"/><rect x="12" y="31" width="16" height="9" fill="#FFD166"/><polygon points="14,0 26,7 14,7" fill="#FFD166"/><polygon points="14,54 26,47 14,47" fill="#FFD166"/></svg>`;
  if(b.id==='danger') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="12" y="14" width="16" height="28" rx="3" fill="#E8001D"/><rect x="12" y="22" width="16" height="8" fill="#0A1628"/><circle cx="15" cy="7" r="5" fill="#0A1628"/><circle cx="25" cy="7" r="5" fill="#0A1628"/></svg>`;
  if(b.id==='safe') return `<svg width="40" height="56" viewBox="0 0 40 56"><rect x="10" y="12" width="20" height="30" rx="10" fill="#fff"/><rect x="10" y="12" width="4" height="30" fill="#E8001D" rx="3"/><rect x="18" y="12" width="4" height="30" fill="#E8001D"/><circle cx="20" cy="7" r="5" fill="#E8001D"/></svg>`;
  if(b.id==='special') return `<svg width="40" height="56" viewBox="0 0 40 56"><ellipse cx="20" cy="32" rx="11" ry="16" fill="#F5C518"/><text x="20" y="10" text-anchor="middle" font-size="14" fill="#F5C518" font-weight="bold">✕</text></svg>`;
  return '';
}

function lSVG(l){
  const cx=35,cy=35,r=28;
  if(l.arc>=360) return `<svg width="70" height="70" viewBox="0 0 70 70"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${l.col}" opacity="0.22"/><circle cx="${cx}" cy="${cy}" r="8" fill="${l.col}"/></svg>`;
  const toR=d=>(d-90)*Math.PI/180;
  const x1=cx+r*Math.cos(toR(l.aS)),y1=cy+r*Math.sin(toR(l.aS));
  const x2=cx+r*Math.cos(toR(l.aS+l.arc)),y2=cy+r*Math.sin(toR(l.aS+l.arc));
  const lg=l.arc>180?1:0;
  return `<svg width="70" height="70" viewBox="0 0 70 70"><path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z" fill="${l.col}" opacity="0.25"/><circle cx="${cx}" cy="${cy}" r="7" fill="${l.col}"/></svg>`;
}

function render(){
  const c=document.getElementById('cnt');
  const t=L[lang];
  if(mod==='iala'){
    const cards=BUOYS.map(b=>`<div class="buoy-card${selB===b.id?' sel':''}" onclick="sb('${b.id}')">${bSVG(b)}<div class="buoy-name" style="color:${b.col==='#fff'?'#ccc':b.col}">${b.names[lang]}</div><div class="buoy-tap">${t.tap}</div></div>`).join('');
    let det='';
    if(selB){
      const b=BUOYS.find(x=>x.id===selB);
      det=`<div class="detail-box"><div class="detail-title" style="color:${b.col==='#fff'?'#ccc':b.col}">${b.names[lang]}</div>
        <div class="detail-row"><div class="d-label">${t.top}</div><div class="d-val">${b.top[lang]}</div></div>
        <div class="detail-row"><div class="d-label">${t.lgt}</div><div class="d-val">${b.lgt[lang]}</div></div>
        <div class="detail-row"><div class="d-label">${t.mA}</div><div class="d-val">${b.mA[lang]}</div></div>
        <div class="detail-row"><div class="d-label">${t.mB}</div><div class="d-val">${b.mB[lang]}</div></div>
        <div class="detail-row"><div class="d-label">${t.use}</div><div class="d-val">${b.use[lang]}</div></div>
      </div>`;
    }
    c.innerHTML=`<div class="sec-title">${t.iT}</div><div class="intro-box">${t.iI}</div><div class="buoy-grid">${cards}</div>${det}`;
  } else if(mod==='lights'){
    const cards=LIGHTS.map(l=>`<div class="light-card${selL===l.id?' sel':''}" onclick="sl('${l.id}')">
      ${lSVG(l)}
      <div><div class="light-name">${l.names[lang]}</div><div class="light-desc">${l.desc[lang]}</div>${selL===l.id?`<div class="light-detail">${l.detail[lang]}</div>`:''}</div>
    </div>`).join('');
    c.innerHTML=`<div class="sec-title">${t.lT}</div><div class="intro-box">${t.lI}</div><div class="lights-list">${cards}</div>`;
  } else if(mod==='colreg'){
    const cards=RULES.map(r=>`<div class="rule-card${selR===r.num?' sel':''}" onclick="sr(${r.num})">
      <div class="rule-header"><div class="rule-num">${r.num}</div><div><div class="rule-title">${r.title[lang]}</div><div class="rule-sub">${r.sub[lang]}</div></div></div>
      ${selR===r.num?`<div class="rule-body">${r.body[lang]}</div>`:''}
    </div>`).join('');
    c.innerHTML=`<div class="sec-title">${t.cT}</div><div class="intro-box">${t.cI}</div><div class="rules-list">${cards}</div>`;
  } else {
    if(qDone){
      const pct=Math.round(qScore/QUIZ.length*100);
      const stars=pct>=80?'★★★':pct>=60?'★★☆':'★☆☆';
      c.innerHTML=`<div class="sec-title">${t.qT}</div><div class="finish-screen"><div class="finish-stars">${stars}</div><div class="finish-score">${qScore}/${QUIZ.length}</div><div class="finish-pct">${t.scr}: ${pct}%</div><button class="restart-btn" onclick="restart()">${t.rst}</button></div>`;
      return;
    }
    const q=QUIZ[qIdx];
    const opts=q.opts.map((o,i)=>`<button class="qopt" data-i="${i}" onclick="ans(${i})">${o[lang]}</button>`).join('');
    c.innerHTML=`<div class="sec-title">${t.qT}</div>
    <div class="quiz-box">
      <div class="quiz-q">${qIdx+1}. ${q.q[lang]}</div>
      <div class="quiz-opts" id="qopts">${opts}</div>
      <div class="quiz-fb" id="qfb"></div>
      <div class="quiz-foot">
        <span class="quiz-prog">${qIdx+1} / ${QUIZ.length} &nbsp; <span class="score-pill">${t.scr}: ${qScore}</span></span>
        <span id="qnav"></span>
      </div>
    </div>`;
  }
}

function sb(id){selB=selB===id?null:id;render();}
function sl(id){selL=selL===id?null:id;render();}
function sr(n){selR=selR===n?null:n;render();}

function ans(i){
  if(qAns) return;
  qAns=true;
  const q=QUIZ[qIdx];
  if(i===q.ans) qScore++;
  document.querySelectorAll('.qopt').forEach((b,idx)=>{
    b.style.pointerEvents='none';
    if(idx===q.ans) b.classList.add('ok');
    else if(idx===i && i!==q.ans) b.classList.add('fail');
  });
  const fb=document.getElementById('qfb');
  fb.textContent=q.exp[lang];
  fb.className='quiz-fb show '+(i===q.ans?'ok':'fail');
  const t=L[lang];
  document.getElementById('qnav').innerHTML=`<button class="next-btn" onclick="nxt()">${qIdx<QUIZ.length-1?t.nxt:t.fin}</button>`;
}

function nxt(){
  if(qIdx<QUIZ.length-1){qIdx++;qAns=false;render();}
  else{qDone=true;render();}
}

function restart(){qIdx=0;qScore=0;qAns=false;qDone=false;render();}

document.getElementById('app').dir='rtl';
render();
</script>
