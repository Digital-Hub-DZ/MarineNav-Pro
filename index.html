let lang = 'ar';
let mod = 'iala';
let selectedBuoy = null;
let selectedLight = null;
let selectedColreg = null;
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;
let quizDone = false;

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach((b, i) => b.classList.toggle('active', ['ar','fr','en'][i] === l));
  document.getElementById('hero-sub').textContent = T[l].heroSub;
  document.getElementById('mn-iala').textContent = T[l].mnIala;
  document.getElementById('mn-lights').textContent = T[l].mnLights;
  document.getElementById('mn-colreg').textContent = T[l].mnColreg;
  document.getElementById('mn-quiz').textContent = T[l].mnQuiz;
  document.getElementById('app').dir = l === 'ar' ? 'rtl' : 'ltr';
  renderModule();
}

function setModule(m) {
  mod = m;
  selectedBuoy = null; selectedLight = null; selectedColreg = null;
  quizIdx = 0; quizScore = 0; quizAnswered = false; quizDone = false;
  document.querySelectorAll('.mod-btn').forEach((b, i) => b.classList.toggle('active', ['iala','lights','colreg','quiz'][i] === m));
  renderModule();
}

function renderModule() {
  const c = document.getElementById('main-content');
  if (mod === 'iala') c.innerHTML = renderIALA();
  else if (mod === 'lights') c.innerHTML = renderLights();
  else if (mod === 'colreg') c.innerHTML = renderColreg();
  else if (mod === 'quiz') c.innerHTML = renderQuiz();
  addEvents();
}

function buoySVG(b, size=50) {
  const s = size, h = size*1.4;
  if (b.id === 'port') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="15" y="10" width="20" height="40" rx="10" fill="${b.bodyColor}"/><rect x="22" y="5" width="6" height="10" fill="#aaa"/><rect x="14" y="50" width="22" height="6" rx="2" fill="${b.bodyColor}"/></svg>`;
  if (b.id === 'starboard') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><polygon points="25,10 40,50 10,50" fill="${b.bodyColor}"/><rect x="22" y="5" width="6" height="10" fill="#aaa"/></svg>`;
  if (b.id === 'north') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="20" width="22" height="35" rx="4" fill="${b.bodyColor}"/><rect x="14" y="20" width="22" height="12" fill="#0A1628"/><polygon points="18,4 25,18 32,4" fill="#0A1628" transform="translate(0,0)"/><polygon points="18,16 25,2 32,16" fill="#0A1628"/></svg>`;
  if (b.id === 'south') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="15" width="22" height="35" rx="4" fill="#FFD166"/><rect x="14" y="37" width="22" height="13" fill="#0A1628"/><polygon points="18,52 25,66 32,52" fill="#0A1628"/><polygon points="18,62 25,48 32,62" fill="#0A1628"/></svg>`;
  if (b.id === 'east') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="15" width="22" height="36" rx="4" fill="#FFD166"/><rect x="14" y="27" width="22" height="12" fill="#0A1628"/><polygon points="18,4 25,18 32,4" fill="#0A1628"/><polygon points="18,54 25,68 32,54" fill="#0A1628" transform="scale(1,-1) translate(0,-70)"/></svg>`;
  if (b.id === 'west') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="15" width="22" height="36" rx="4" fill="#0A1628"/><rect x="14" y="15" width="22" height="12" fill="#FFD166"/><rect x="14" y="39" width="22" height="12" fill="#FFD166"/><polygon points="18,4 32,11 18,11" fill="#FFD166" transform="rotate(180,25,8)"/><polygon points="18,60 32,53 18,53" fill="#FFD166"/></svg>`;
  if (b.id === 'danger') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="15" width="22" height="36" rx="4" fill="#E8001D"/><rect x="14" y="27" width="22" height="12" fill="#0A1628"/><circle cx="20" cy="8" r="5" fill="#0A1628"/><circle cx="30" cy="8" r="5" fill="#0A1628"/></svg>`;
  if (b.id === 'safewater') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><rect x="14" y="15" width="22" height="36" rx="11" fill="#fff"/><rect x="14" y="15" width="5" height="36" fill="#E8001D" rx="4"/><rect x="22" y="15" width="5" height="36" fill="#E8001D"/><rect x="31" y="15" width="5" height="36" rx="4" fill="#E8001D"/><circle cx="25" cy="8" r="6" fill="#E8001D"/></svg>`;
  if (b.id === 'special') return `<svg width="${s}" height="${h}" viewBox="0 0 50 70"><ellipse cx="25" cy="38" rx="12" ry="18" fill="#F5C518"/><rect x="22" y="10" width="6" height="14" fill="#aaa"/><text x="25" y="12" text-anchor="middle" font-size="14" fill="#F5C518" font-weight="bold">✕</text></svg>`;
  return '';
}

function lightSVG(l) {
  const cx=40, cy=40, r=30;
  const a = l.arc, s = l.arcStart;
  if (a >= 360) return `<svg width="80" height="80" viewBox="0 0 80 80"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${l.color}" opacity="0.25"/><circle cx="${cx}" cy="${cy}" r="7" fill="${l.color}"/></svg>`;
  const toRad = d => (d - 90) * Math.PI / 180;
  const x1 = cx + r*Math.cos(toRad(s)), y1 = cy + r*Math.sin(toRad(s));
  const x2 = cx + r*Math.cos(toRad(s+a)), y2 = cy + r*Math.sin(toRad(s+a));
  const lg = a > 180 ? 1 : 0;
  return `<svg width="80" height="80" viewBox="0 0 80 80">
    <path d="M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${lg},1 ${x2},${y2} Z" fill="${l.color}" opacity="0.28"/>
    <circle cx="${cx}" cy="${cy}" r="6" fill="${l.color}"/>
  </svg>`;
}

function renderIALA() {
  const t = T[lang];
  let cards = BUOYS.map(b => `
    <div class="buoy-card ${selectedBuoy===b.id?'selected':''}" onclick="selectBuoy('${b.id}')">
      <div class="buoy-visual">${buoySVG(b)}</div>
      <div class="buoy-name" style="color:${b.bodyColor==='#fff'?'#aaa':b.bodyColor}">${b.names[lang]}</div>
      <div class="buoy-meaning">${t.click}</div>
    </div>`).join('');

  let detail = '';
  if (selectedBuoy) {
    const b = BUOYS.find(x=>x.id===selectedBuoy);
    detail = `<div class="detail-panel show">
      <div style="font-size:14px;font-weight:700;color:${b.bodyColor==='#fff'?'#ccc':b.bodyColor};margin-bottom:0.5rem">${b.names[lang]}</div>
      <div class="detail-grid">
        <div class="detail-item"><div class="detail-label">${t.detail_top}</div><div class="detail-value">${b.topMark[lang]}</div></div>
        <div class="detail-item"><div class="detail-label">${t.detail_light}</div><div class="detail-value">${b.light[lang]}</div></div>
        <div class="detail-item"><div class="detail-label">${t.detail_meaning_a}</div><div class="detail-value">${b.meaningA[lang]}</div></div>
        <div class="detail-item"><div class="detail-label">${t.detail_meaning_b}</div><div class="detail-value">${b.meaningB[lang]}</div></div>
        <div class="detail-item" style="grid-column:1/-1"><div class="detail-label">${t.detail_use}</div><div class="detail-value">${b.use[lang]}</div></div>
      </div>
    </div>`;
  }

  return `<div class="section-title">${t.ialaTitle}</div>
    <div class="intro-card">${t.ialaIntro}</div>
    <div class="buoy-grid">${cards}</div>
    ${detail}`;
}

function renderLights() {
  const t = T[lang];
  let cards = LIGHTS.map(l => `
    <div class="light-card ${selectedLight===l.id?'selected':''}" onclick="selectLight('${l.id}')">
      <div class="light-diagram">${lightSVG(l)}</div>
      <div class="light-name">${l.names[lang]}</div>
      <div class="light-desc">${l.desc[lang]}</div>
    </div>`).join('');

  let detail = '';
  if (selectedLight) {
    const l = LIGHTS.find(x=>x.id===selectedLight);
    detail = `<div class="detail-panel show">
      <div style="font-size:14px;font-weight:700;margin-bottom:0.5rem;color:${l.color==='#fff'?'#ccc':l.color}">${l.names[lang]}</div>
      <div class="detail-item"><div class="detail-label" style="margin-bottom:4px">${t.detail_light}</div><div class="detail-value" style="font-size:12px">${l.detail[lang]}</div></div>
    </div>`;
  }

  return `<div class="section-title">${t.lightsTitle}</div>
    <div class="intro-card">${t.lightsIntro}</div>
    <div class="lights-grid">${cards}</div>
    ${detail}`;
}

function renderColreg() {
  const t = T[lang];
  let rules = COLREGS.map(r => `
    <div class="colreg-rule ${selectedColreg===r.num?'selected':''}" onclick="selectColreg(${r.num})">
      <div class="colreg-header">
        <div class="colreg-num">${r.num}</div>
        <div>
          <div class="colreg-title">${r.titles[lang]}</div>
          <div class="colreg-sub">${r.subs[lang]}</div>
        </div>
      </div>
      <div class="colreg-body ${selectedColreg===r.num?'show':''}">${r.body[lang]}</div>
    </div>`).join('');

  return `<div class="section-title">${t.colregTitle}</div>
    <div class="intro-card">${t.colregIntro}</div>
    <div class="colreg-list">${rules}</div>`;
}

function renderQuiz() {
  const t = T[lang];
  if (quizDone) {
    const pct = Math.round(quizScore/QUIZ.length*100);
    const stars = pct>=80?'★★★':pct>=60?'★★☆':'★☆☆';
    return `<div class="section-title">${t.quizTitle}</div>
      <div class="quiz-box" style="text-align:center">
        <div style="font-size:40px;margin-bottom:0.7rem">${stars}</div>
        <div style="font-size:22px;font-weight:700;color:var(--gold);margin-bottom:0.4rem">${quizScore}/${QUIZ.length}</div>
        <div style="font-size:13px;color:rgba(248,250,255,0.7);margin-bottom:1.2rem">${t.score}: ${pct}%</div>
        <button class="quiz-opt" style="display:inline-block;cursor:pointer;max-width:200px;text-align:center" onclick="restartQuiz()">${t.restart}</button>
      </div>`;
  }

  const q = QUIZ[quizIdx];
  const opts = q.opts.map((o, i) => {
    let cls = '';
    if (quizAnswered) cls = i===q.correct?'correct':(document.querySelector('.quiz-opt.wrong')&&i===parseInt(document.querySelector('.quiz-opt.wrong').dataset.idx)?'wrong':'');
    return `<button class="quiz-opt${cls?' '+cls:''}" data-idx="${i}" onclick="answerQuiz(${i})">${o[lang]}</button>`;
  }).join('');

  return `<div class="section-title">${t.quizTitle}</div>
    <div class="intro-card" style="font-size:12px">${t.quizIntro}</div>
    <div class="quiz-box">
      <div class="quiz-q">${quizIdx+1}. ${q.q[lang]}</div>
      <div class="quiz-opts" id="quiz-opts">${opts}</div>
      <div class="quiz-feedback ${quizAnswered?'show':''} ${quizAnswered?(document.querySelector?.(`.quiz-opt.correct`)?'ok':'fail'):''}" id="quiz-feedback">
        ${quizAnswered?q.explain[lang]:''}
      </div>
      <div class="quiz-nav">
        <span class="quiz-progress">${quizIdx+1} / ${QUIZ.length} &nbsp; <span class="score-badge">${t.score}: ${quizScore}</span></span>
        ${quizAnswered?`<button onclick="nextQuiz()">${quizIdx<QUIZ.length-1?t.next:t.finish}</button>`:''}
      </div>
    </div>`;
}

function selectBuoy(id) {
  selectedBuoy = selectedBuoy===id?null:id;
  renderModule();
}
function selectLight(id) {
  selectedLight = selectedLight===id?null:id;
  renderModule();
}
function selectColreg(num) {
  selectedColreg = selectedColreg===num?null:num;
  renderModule();
}

function answerQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = QUIZ[quizIdx];
  if (idx === q.correct) quizScore++;
  const opts = document.querySelectorAll('.quiz-opt');
  opts.forEach((b, i) => {
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx && idx !== q.correct) b.classList.add('wrong');
  });
  const fb = document.getElementById('quiz-feedback');
  if (fb) {
    fb.textContent = q.explain[lang];
    fb.className = `quiz-feedback show ${idx===q.correct?'ok':'fail'}`;
  }
  const nav = document.querySelector('.quiz-nav');
  if (nav) {
    const t = T[lang];
    nav.innerHTML = `<span class="quiz-progress">${quizIdx+1} / ${QUIZ.length} &nbsp; <span class="score-badge">${t.score}: ${quizScore}</span></span>
      <button onclick="nextQuiz()">${quizIdx<QUIZ.length-1?t.next:t.finish}</button>`;
  }
}

function nextQuiz() {
  if (quizIdx < QUIZ.length-1) {
    quizIdx++; quizAnswered = false; renderModule();
  } else {
    quizDone = true; renderModule();
  }
}

function restartQuiz() {
  quizIdx=0; quizScore=0; quizAnswered=false; quizDone=false; renderModule();
}

function addEvents() {}

document.getElementById('app').dir = 'rtl';
renderModule();
</script>
